<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Divadelni programy 2026</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="container">
      <div class="festival-tabs">
        <button class="festival-tab" data-festival="combined">Oba festivaly</button>
        <button class="festival-tab active" data-festival="flora">Divadelni Flora Olomouc</button>
        <button class="festival-tab" data-festival="dsb">Divadelni svet Brno 2026</button>
      </div>
      <div class="day-nav" id="dayNav"></div>
      <div class="filter-bar" id="filterBar">
        <label><input type="checkbox" id="filterFree"> Pouze zdarma</label>
        <label><input type="checkbox" id="filterSubtitles"> Titulky / EN friendly</label>
        <label>
          Vstupenky
          <select class="filter-select" id="filterTicket" aria-label="Filtrovat podle vstupenek">
            <option value="all">Vše</option>
            <option value="soldout">Vyprodáno</option>
            <option value="lastfew">Poslední vstupenky</option>
            <option value="other">Ostatní / neuvedeno</option>
          </select>
        </label>
        <label><input type="checkbox" id="filterHideDj"> Skrýt DJ / koncert</label>
        <div class="filter-venue-wrap">
          <span class="filter-venue-label">Místo</span>
          <input type="text" id="filterVenue" list="venueDatalist" placeholder="Všechna místa nebo část názvu…" autocomplete="off" aria-label="Filtrovat podle místa konání">
          <datalist id="venueDatalist"></datalist>
        </div>
        <button type="button" class="filter-reset" id="filterReset">Zrušit filtry</button>
      </div>
    </div>
  </header>
  <main>
    <div class="container">
      <p class="stats" id="stats"></p>
      <div id="content"></div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
